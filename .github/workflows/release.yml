name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nerve ${{ steps.get_version.outputs.version }}
          body: |
            ## Nerve ${{ steps.get_version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Installation

            Download the binary for your platform below, or build from source:
            ```bash
            git clone https://github.com/Artaeon/nerve.git
            cd nerve && cargo build --release
            ```
          draft: false
          prerelease: false

  build-release:
    name: Build (${{ matrix.artifact }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: nerve-linux-x86_64
            binary: nerve
          - os: macos-latest
            artifact: nerve-macos-arm64
            binary: nerve
          - os: macos-13
            artifact: nerve-macos-x86_64
            binary: nerve
          - os: windows-latest
            artifact: nerve-windows-x86_64
            binary: nerve.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}
      - run: cargo build --release
      - name: Package
        run: |
          cd target/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../../${{ matrix.artifact }}.zip ${{ matrix.binary }}
          else
            tar czf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          fi
        shell: bash
      - name: Generate checksum
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            sha256sum ${{ matrix.artifact }}.zip > ${{ matrix.artifact }}.sha256
          else
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.sha256
          fi
        shell: bash
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.sha256
