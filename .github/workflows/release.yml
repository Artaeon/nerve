name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: nerve-linux-x86_64
            binary: nerve
            archive_ext: tar.gz
          - os: macos-latest
            artifact: nerve-macos-arm64
            binary: nerve
            archive_ext: tar.gz
          - os: macos-latest
            artifact: nerve-macos-x86_64
            target: x86_64-apple-darwin
            binary: nerve
            archive_ext: tar.gz
          - os: windows-latest
            artifact: nerve-windows-x86_64
            binary: nerve.exe
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}-${{ matrix.target || 'default' }}
      - name: Build
        run: cargo build --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          else
            cp target/release/${{ matrix.binary }} .
          fi
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        run: |
          set -euo pipefail
          cp target/release/${{ matrix.binary }} .
          7z a ${{ matrix.artifact }}.zip ${{ matrix.binary }}
        shell: bash
      - name: Generate checksum
        run: sha256sum ${{ matrix.artifact }}.${{ matrix.archive_ext }} > ${{ matrix.artifact }}.${{ matrix.archive_ext }}.sha256
        shell: bash
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ matrix.artifact }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact }}.${{ matrix.archive_ext }}.sha256
