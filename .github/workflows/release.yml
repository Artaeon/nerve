name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nerve ${{ steps.get_version.outputs.version }}
          body: |
            ## Nerve ${{ steps.get_version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Installation

            Download the binary for your platform below, extract, and place in your PATH.

            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 | `nerve-linux-x86_64.tar.gz` |
            | macOS Apple Silicon | `nerve-macos-arm64.tar.gz` |
            | macOS Intel | `nerve-macos-x86_64.tar.gz` |
            | Windows x86_64 | `nerve-windows-x86_64.zip` |

            Or build from source:
            ```bash
            git clone https://github.com/Artaeon/nerve.git
            cd nerve && cargo build --release
            ```

            SHA256 checksums are included for each binary.
          draft: false
          prerelease: false

  build-release:
    name: Build (${{ matrix.artifact }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: nerve-linux-x86_64
            binary: nerve
            archive_ext: tar.gz
          - os: macos-latest
            artifact: nerve-macos-arm64
            binary: nerve
            archive_ext: tar.gz
          - os: macos-13
            artifact: nerve-macos-x86_64
            binary: nerve
            archive_ext: tar.gz
          - os: windows-latest
            artifact: nerve-windows-x86_64
            binary: nerve.exe
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}
      - run: cargo build --release
      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          cd target/release
          tar czf ../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        run: |
          cd target/release
          7z a ../../${{ matrix.artifact }}.zip ${{ matrix.binary }}
        shell: bash
      - name: Generate checksum
        run: sha256sum ${{ matrix.artifact }}.${{ matrix.archive_ext }} > ${{ matrix.artifact }}.${{ matrix.archive_ext }}.sha256
        shell: bash
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ matrix.artifact }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact }}.${{ matrix.archive_ext }}.sha256
