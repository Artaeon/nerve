name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run `nerve ...`
        2. Navigate to ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Environment
      description: Operating system where the issue occurs.
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Nerve Version
      description: Output of `nerve --version` or the commit hash.
      placeholder: "0.1.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help (logs, screenshots, configuration).
    validations:
      required: false
